#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The s6-overlay stage2 hook remaps the internal `hermes` user to these
# values via usermod/groupmod; each supervised service then drops to that
# user via `s6-setuidgid`.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - If you override entrypoint, keep `/init` as the first command in
#     the chain (or let docker use the image's default ENTRYPOINT,
#     which is `["/init", "/opt/hermes/docker/main-wrapper.sh"]`).
#     `/init` is s6-overlay's PID 1 — it runs the cont-init.d scripts
#     (chown, profile reconcile, dashboard toggle) and sets up the
#     supervision tree before any service starts. Bypassing it skips
#     all of that setup and the gateway will not work correctly.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    # Current Hermes runtime secrets live on the host at ~/.hermes/.env.
    # Docker mounts that directory at /opt/data, while env_file exports the
    # values into the supervised gateway process (including Telegram and
    # model-provider keys such as GLM_API_KEY / DEEPSEEK_API_KEY).
    # Model routing belongs in ~/.hermes/config.yaml, not here: this local
    # profile currently uses Z.AI GLM-5.1 as primary and DeepSeek subagents.
    # This is NOT the final finance deployment location: trader/ is still an
    # independent paper-trading core and has not yet been adapted to Hermes.
    # Its own future runtime secrets/config must be wired through a dedicated
    # Hermes finance skill/adapter, never copied into the repository.
    env_file:
      - ${HOME}/.hermes/.env
    volumes:
      - ~/.hermes:/opt/data
      # Read-only, secret-filtered source mirror for Telegram/cron code review.
      # scripts/hermes_daily_redeploy.sh refreshes it; never mount the raw
      # checkout because trader/.env and other local secret files must remain
      # outside the agent's readable workspace.
      - ${HOME}/.hermes/workspace/hermes-agent:/workspace/hermes-agent:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
      # Google Chat — uncomment and fill in to enable the Google Chat gateway.
      # See website/docs/user-guide/messaging/google_chat.md for the full setup.
      # The SA JSON path must point to a file mounted into the container —
      # add a volume entry above (e.g. ``- ~/.hermes/google-chat-sa.json:/secrets/google-chat-sa.json:ro``)
      # then set GOOGLE_CHAT_SERVICE_ACCOUNT_JSON to that mount path.
      # - GOOGLE_CHAT_PROJECT_ID=${GOOGLE_CHAT_PROJECT_ID}
      # - GOOGLE_CHAT_SUBSCRIPTION_NAME=${GOOGLE_CHAT_SUBSCRIPTION_NAME}
      # - GOOGLE_CHAT_SERVICE_ACCOUNT_JSON=${GOOGLE_CHAT_SERVICE_ACCOUNT_JSON}
      # - GOOGLE_CHAT_ALLOWED_USERS=${GOOGLE_CHAT_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    # Publish only to the macOS loopback interface.  /etc/hosts maps the
    # local development name my.hermes to 127.0.0.1; this is not a LAN or
    # internet-facing endpoint.
    ports:
      - "127.0.0.1:9119:9119"
    # The dashboard binds to all interfaces *inside* the container so Docker
    # can forward the loopback-only host port.  Hermes therefore enables its
    # built-in auth gate; credentials remain in ~/.hermes/.env.
    env_file:
      - ${HOME}/.hermes/.env
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # The Finance service (trader/: `python -m swing_trader serve`) runs on
      # the HOST in Phase 0; inside the container 127.0.0.1 is the container
      # itself, so the /api/finance/* reverse proxy must target the host.
      - HERMES_FINANCE_SERVICE_URL=http://host.docker.internal:9319
    extra_hosts:
      # Native on Docker Desktop (macOS); required on Linux engines.
      - "host.docker.internal:host-gateway"
    # Localhost-only at the Docker boundary. For remote access, use a VPN or
    # a separately authenticated reverse proxy; do not expose this port.
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]

  # --------------------------------------------------------------------------
  # hermes-finance-vector — private Qdrant vector store for the Finance
  # knowledge store (Loop.md §5.10, "local vector index").
  #
  #   - INTERNAL ONLY: no published host port (deliberately no `ports:`
  #     mapping), and the service sits alone on the `finance-internal`
  #     network. ONLY Finance-service containers may join `finance-internal`;
  #     the gateway, the dashboard, the host LAN, and everything else must
  #     stay off it.
  #   - FAIL CLOSED: the vector index is storage/search infrastructure, not
  #     an execution dependency. When this service is down, trading must
  #     block research-dependent NEW entries (fail closed) and must never
  #     lose or alter Ledger records; the facts layer and the SQLite ledger
  #     are unaffected by vector outages (Loop.md §5.10).
  #   - BACK UP BEFORE UPGRADES: snapshot the hermes-finance-vector-data
  #     volume with docker/finance/backup-vector.sh before changing the image
  #     tag (Qdrant storage-format migrations are one-way). Full backup /
  #     restore drill: docs/finance-vector.md.
  # --------------------------------------------------------------------------
  hermes-finance-vector:
    # v1.15.4 — latest stable Qdrant release known as of 2025-09. Check the
    # release notes AND take a volume backup before bumping this tag.
    image: qdrant/qdrant:v1.15.4
    container_name: hermes-finance-vector
    restart: unless-stopped
    networks:
      - finance-internal
    volumes:
      - hermes-finance-vector-data:/qdrant/storage
    environment:
      # finance-internal is `internal: true` (no egress), so telemetry could
      # never leave the host anyway; disable it explicitly.
      - QDRANT__TELEMETRY_DISABLED=true
    healthcheck:
      # The qdrant image ships neither curl nor wget, so use bash's /dev/tcp
      # to hit the readiness endpoint (/readyz) on the container-internal
      # HTTP port 6333.
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -c 512 <&3 | grep -q \"200 OK\"'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Example — how a future Finance-service container joins the private
  # network (uncomment and adapt when the Finance service is containerized;
  # ONLY Finance-service containers may join finance-internal):
  # finance-service:
  #   image: hermes-finance
  #   restart: unless-stopped
  #   networks:
  #     - finance-internal
  #   environment:
  #     - QDRANT_URL=http://hermes-finance-vector:6333

volumes:
  # Qdrant persistence for the Finance knowledge store. Back this volume up
  # (docker/finance/backup-vector.sh) before every image upgrade and on a
  # regular schedule; see docs/finance-vector.md.
  hermes-finance-vector-data:

networks:
  # Private network for the Finance knowledge store (Loop.md §5.10).
  # `internal: true` means Docker attaches no gateway: nothing on this
  # network is reachable from the host/LAN and nothing on it has outbound
  # internet access. ONLY Finance-service containers may join this network.
  finance-internal:
    internal: true
